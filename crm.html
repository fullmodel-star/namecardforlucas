<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="theme-color" content="#4f7cff">
<title>客戶追蹤 CRM</title>
<script>/* 開場即依名片 App 傳來的主題上色，避免白閃 */document.documentElement.setAttribute('data-theme', new URLSearchParams(location.search).get('theme')==='light'?'light':'dark');</script>
<style>
  :root{
    --bg:#eef1f5; --card:#fff; --line:#eef1f5; --ink:#1c2430; --sub:#8a94a6;
    --accent:#4f7cff; --red:#e5484d; --yellow:#d98a00; --green:#22a565; --grey:#aab2c0;
  }
  *{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
  body{font-family:-apple-system,"Segoe UI","Microsoft JhengHei",sans-serif;background:var(--bg);color:var(--ink);}
  .wrap{max-width:480px;margin:0 auto;min-height:100vh;background:var(--bg);display:flex;flex-direction:column;position:relative;}

  .top{padding:16px 20px 12px;background:var(--bg);position:sticky;top:0;z-index:5;}
  .top h1{font-size:24px;font-weight:800;}
  .top .sub{font-size:13px;color:var(--sub);margin-top:3px;}
  .top-actions{position:absolute;right:16px;top:18px;display:flex;gap:8px;}
  .icon-btn{background:var(--card);border:1px solid var(--line);border-radius:12px;padding:8px 11px;font-size:13px;font-weight:600;color:var(--ink);cursor:pointer;}

  .body{flex:1;overflow-y:auto;padding:0 16px 90px;}
  .search{display:flex;align-items:center;gap:8px;background:#f1f3f7;border-radius:12px;padding:11px 14px;margin:6px 0 16px;}
  .search input{border:none;background:transparent;outline:none;font-size:15px;flex:1;color:var(--ink);}

  .today{background:linear-gradient(135deg,#4f7cff,#6a5cff);color:#fff;border-radius:18px;padding:16px 18px;margin-bottom:18px;box-shadow:0 8px 20px rgba(80,100,255,.28);}
  .today .t1{font-size:13px;opacity:.85;}
  .today .t2{font-size:16px;font-weight:700;margin-top:5px;line-height:1.5;}

  .lbl{font-size:12px;font-weight:700;color:var(--sub);letter-spacing:1px;margin:14px 4px 10px;}

  .card{display:flex;align-items:center;gap:12px;background:var(--card);border:1px solid var(--line);border-radius:14px;padding:13px 14px;margin-bottom:10px;cursor:pointer;transition:.12s;}
  .card:active{transform:scale(.985);background:#fafbfc;}
  .avatar{width:44px;height:44px;border-radius:50%;flex-shrink:0;display:flex;align-items:center;justify-content:center;font-weight:700;color:#fff;font-size:17px;overflow:hidden;background-size:cover;background-position:center;}
  .c-main{flex:1;min-width:0;}
  .c-name{font-size:16px;font-weight:700;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
  .c-org{font-size:13px;color:var(--sub);margin-top:2px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
  .status{font-size:12px;font-weight:600;padding:5px 10px;border-radius:20px;white-space:nowrap;display:flex;align-items:center;gap:5px;}
  .dot{width:7px;height:7px;border-radius:50%;}
  .s-red{background:#ffe9e9;color:var(--red);} .s-red .dot{background:var(--red);}
  .s-yellow{background:#fff4e0;color:var(--yellow);} .s-yellow .dot{background:var(--yellow);}
  .s-green{background:#e4f8ec;color:var(--green);} .s-green .dot{background:var(--green);}
  .s-grey{background:#eef1f5;color:#66738a;} .s-grey .dot{background:var(--grey);}

  .empty{text-align:center;color:var(--sub);padding:60px 24px;line-height:1.8;font-size:14px;}
  .empty .big{font-size:40px;margin-bottom:12px;}

  .source-tag{display:inline-block;font-size:11px;padding:3px 9px;border-radius:8px;font-weight:600;margin-left:6px;}
  .src-live{background:#e4f8ec;color:var(--green);}
  .src-json{background:#fff4e0;color:var(--yellow);}
  .src-none{background:#ffe9e9;color:var(--red);}

  .fab{position:fixed;right:calc(50% - 240px + 20px);bottom:24px;background:var(--ink);color:#fff;border:none;border-radius:16px;padding:14px 20px;font-size:15px;font-weight:700;box-shadow:0 10px 24px rgba(28,36,48,.35);cursor:pointer;z-index:6;}
  @media(max-width:520px){.fab{right:20px;}}

  .detail{position:fixed;inset:0;background:var(--bg);z-index:20;transform:translateX(100%);transition:transform .22s ease;display:flex;flex-direction:column;max-width:480px;margin:0 auto;}
  .detail.open{transform:translateX(0);}
  .d-back{padding:12px 20px 6px;color:var(--accent);font-weight:600;font-size:16px;cursor:pointer;}
  .d-body{flex:1;overflow-y:auto;padding-bottom:110px;}
  .d-head{padding:8px 22px 18px;}
  .d-av{width:64px;height:64px;border-radius:50%;display:flex;align-items:center;justify-content:center;color:#fff;font-weight:800;font-size:26px;margin-bottom:12px;overflow:hidden;background-size:cover;background-position:center;}
  .d-name{font-size:24px;font-weight:800;}
  .d-role{font-size:14px;color:var(--sub);margin-top:3px;}
  .contact{display:flex;gap:10px;margin-top:16px;}
  .contact a{flex:1;text-align:center;background:#f1f3f7;border-radius:12px;padding:11px;font-size:14px;font-weight:600;color:#3a4658;text-decoration:none;}
  .contact a.off{opacity:.35;pointer-events:none;}

  .remind-box{margin:12px 16px 16px;background:#fff8e8;border:1px solid #ffe4b0;border-radius:14px;padding:14px 16px;display:flex;justify-content:space-between;align-items:center;cursor:pointer;}
  .remind-box .r1{font-size:12px;color:#c98a1a;font-weight:700;}
  .remind-box .r2{font-size:15px;font-weight:700;margin-top:3px;color:#7a5a10;}
  .remind-box.none{background:var(--card);border-color:var(--line);}
  .remind-box.none .r1{color:var(--sub);} .remind-box.none .r2{color:var(--ink);font-weight:600;font-size:14px;}

  .log{padding:0 22px;}
  .log-item{display:flex;gap:12px;padding:14px 0;border-bottom:1px solid #f3f5f8;}
  .log-date{font-size:12px;color:var(--sub);width:64px;flex-shrink:0;font-weight:600;padding-top:2px;}
  .log-text{font-size:15px;line-height:1.5;}
  .log-tag{display:inline-block;font-size:11px;padding:2px 8px;border-radius:8px;background:#eef1f7;color:#66738a;margin-right:6px;font-weight:600;}
  .log-empty{padding:24px;text-align:center;color:var(--sub);font-size:14px;}

  .actions{position:absolute;bottom:0;left:0;right:0;padding:14px 16px calc(env(safe-area-inset-bottom) + 16px);background:var(--card);border-top:1px solid var(--line);display:flex;gap:10px;max-width:480px;margin:0 auto;}
  .btn{flex:1;text-align:center;padding:15px;border-radius:14px;font-size:15px;font-weight:700;cursor:pointer;border:none;}
  .btn-primary{background:var(--ink);color:#fff;}
  .btn-ghost{background:#f1f3f7;color:#3a4658;}

  .sheet-mask{position:fixed;inset:0;background:rgba(20,28,40,.45);z-index:30;opacity:0;pointer-events:none;transition:.2s;}
  .sheet-mask.open{opacity:1;pointer-events:auto;}
  .sheet{position:fixed;left:0;right:0;bottom:0;background:var(--card);border-radius:24px 24px 0 0;z-index:31;transform:translateY(100%);transition:transform .24s ease;max-width:480px;margin:0 auto;padding:20px 20px calc(env(safe-area-inset-bottom) + 20px);max-height:88vh;overflow-y:auto;}
  .sheet.open{transform:translateY(0);}
  .sheet h3{font-size:18px;font-weight:800;margin-bottom:16px;}
  .hint{font-size:13px;color:var(--sub);line-height:1.6;margin:-6px 0 16px;}
  .type-row{display:flex;gap:8px;margin-bottom:14px;flex-wrap:wrap;}
  .type-chip{padding:9px 14px;border-radius:12px;background:#f1f3f7;font-size:14px;font-weight:600;cursor:pointer;border:2px solid transparent;}
  .type-chip.on{border-color:var(--accent);background:#eaf0ff;color:var(--accent);}
  .sub-lbl{font-size:12px;font-weight:700;color:var(--sub);letter-spacing:.5px;margin:2px 2px 8px;}
  .field{margin-bottom:12px;}
  .field label{display:block;font-size:12px;font-weight:700;color:var(--sub);margin-bottom:6px;letter-spacing:.5px;}
  .sheet textarea,.sheet input[type=text],.sheet input[type=date],.sheet input[type=number]{width:100%;border:1px solid var(--line);border-radius:12px;padding:13px;font-size:15px;font-family:inherit;outline:none;background:#fafbfc;}
  .sheet textarea{min-height:80px;resize:none;}
  .sheet .save{width:100%;background:var(--ink);color:#fff;border:none;border-radius:14px;padding:15px;font-size:16px;font-weight:700;cursor:pointer;margin-top:4px;}
  .sheet .clear{width:100%;background:transparent;color:var(--red);border:none;padding:12px;font-size:14px;font-weight:600;cursor:pointer;margin-top:6px;}
  .mini-toggle{font-size:13px;color:var(--accent);font-weight:600;cursor:pointer;margin:-4px 2px 14px;}

  .toast{position:fixed;bottom:calc(env(safe-area-inset-bottom) + 24px);left:50%;transform:translateX(-50%) translateY(20px);background:var(--ink);color:#fff;padding:12px 20px;border-radius:14px;font-size:14px;font-weight:600;z-index:50;opacity:0;transition:.25s;pointer-events:none;}
  .toast.show{opacity:1;transform:translateX(-50%) translateY(0);}

  /* ===== 深色模式：跟名片 App 主題同步 ===== */
  html[data-theme="dark"]{
    color-scheme:dark;
    --bg:#141416; --card:#1e1e22; --line:#2c2c33; --ink:#f0f1f4; --sub:#9aa1ad;
    --accent:#6a8bff; --red:#ff6b6f; --yellow:#e0a83a; --green:#35c07d; --grey:#5a6070;
  }
  html[data-theme="dark"] .search{background:#26262c;}
  html[data-theme="dark"] .search input{color:var(--ink);}
  html[data-theme="dark"] .icon-btn{background:#26262c;color:var(--ink);border-color:#2c2c33;}
  html[data-theme="dark"] .card:active{background:#26262c;}
  html[data-theme="dark"] .s-red{background:rgba(255,107,111,.16);}
  html[data-theme="dark"] .s-yellow{background:rgba(224,168,58,.16);}
  html[data-theme="dark"] .s-green{background:rgba(53,192,125,.16);}
  html[data-theme="dark"] .s-grey{background:rgba(150,160,180,.14);color:#aab2c0;}
  html[data-theme="dark"] .src-live{background:rgba(53,192,125,.18);}
  html[data-theme="dark"] .src-json{background:rgba(224,168,58,.18);}
  html[data-theme="dark"] .src-none{background:rgba(255,107,111,.18);}
  html[data-theme="dark"] .contact a{background:#26262c;color:#cbd2de;}
  html[data-theme="dark"] .remind-box{background:rgba(224,168,58,.12);border-color:rgba(224,168,58,.3);}
  html[data-theme="dark"] .remind-box .r2{color:#f0d9a0;}
  html[data-theme="dark"] .remind-box.none{background:#1e1e22;border-color:#2c2c33;}
  html[data-theme="dark"] .remind-box.none .r2{color:var(--ink);}
  html[data-theme="dark"] .log-item{border-color:#2c2c33;}
  html[data-theme="dark"] .log-tag{background:#26262c;color:#9aa1ad;}
  html[data-theme="dark"] .type-chip{background:#26262c;color:#cbd2de;}
  html[data-theme="dark"] .type-chip.on{background:rgba(106,139,255,.24);color:#aebfff;border-color:var(--accent);}
  html[data-theme="dark"] .sheet textarea,
  html[data-theme="dark"] .sheet input[type=text],
  html[data-theme="dark"] .sheet input[type=date],
  html[data-theme="dark"] .sheet input[type=number]{background:#26262c;color:var(--ink);border-color:#2c2c33;}
  html[data-theme="dark"] .btn-ghost{background:#26262c;color:#cbd2de;}
  html[data-theme="dark"] .btn-primary,
  html[data-theme="dark"] .sheet .save,
  html[data-theme="dark"] .fab,
  html[data-theme="dark"] .empty button{background:var(--accent);color:#fff;}
  html[data-theme="dark"] .toast{background:#2c2c33;color:#fff;}
</style>
</head>
<body>
<div class="wrap">
  <div class="top">
    <h1>我的客戶</h1>
    <div class="sub" id="subline">載入中…</div>
    <div class="top-actions">
      <button class="icon-btn" onclick="openSettings()">⚙</button>
    </div>
  </div>
  <div class="body">
    <div class="search">🔍
      <input id="q" placeholder="搜尋姓名 / 公司 / 紀錄內容" oninput="render()">
    </div>
    <div id="today-wrap"></div>
    <div id="list"></div>
  </div>
  <button class="fab" onclick="openNewCustomer()">＋ 新增客戶</button>
</div>

<!-- 詳情 -->
<div class="detail" id="detail">
  <div class="d-back" onclick="closeDetail()">‹ 返回</div>
  <div class="d-body" id="d-body"></div>
  <div class="actions">
    <button class="btn btn-ghost" onclick="openLogSheet()">✎ 記一筆</button>
    <button class="btn btn-primary" onclick="openRemindSheet()">⏰ 設提醒</button>
  </div>
</div>

<div class="sheet-mask" id="mask" onclick="closeSheets()"></div>

<!-- 記一筆 -->
<div class="sheet" id="logSheet">
  <h3>記一筆互動</h3>
  <div class="sub-lbl">怎麼聯絡</div>
  <div class="type-row" id="typeRow"></div>
  <div class="sub-lbl">重點（可不選，點一下就好）</div>
  <div class="type-row" id="logNoteChips"></div>
  <div class="field" id="logCustomField" style="display:none;"><textarea id="logText" placeholder="自己打…"></textarea></div>
  <div class="mini-toggle" id="logDateToggle" onclick="showLogDate()">＋ 補以前的日期</div>
  <div class="field" id="logDateField" style="display:none;"><label>日期</label><input type="date" id="logDate"></div>
  <button class="save" onclick="saveLog()">儲存</button>
</div>

<!-- 設提醒 -->
<div class="sheet" id="remindSheet">
  <h3>設定下次提醒</h3>
  <div class="sub-lbl">多久後提醒</div>
  <div class="type-row" id="remindQuick"></div>
  <div class="field"><label>提醒日期</label><input type="date" id="remindDate" oninput="clearRemindChip()"></div>
  <div class="sub-lbl">事由（可不選，點一下就好）</div>
  <div class="type-row" id="remindReasonChips"></div>
  <div class="field" id="remindCustomField" style="display:none;"><textarea id="remindNote" placeholder="自己打…" style="min-height:56px;"></textarea></div>
  <button class="save" onclick="saveRemind()">儲存提醒</button>
  <button class="clear" onclick="clearRemind()">清除提醒</button>
</div>

<!-- 新增客戶 -->
<div class="sheet" id="newSheet">
  <h3>新增客戶</h3>
  <div class="field"><label>姓名 *</label><input type="text" id="nc-name" placeholder="王小明"></div>
  <div class="field"><label>公司</label><input type="text" id="nc-org" placeholder="某某公司"></div>
  <div class="field"><label>手機</label><input type="text" id="nc-mobile" placeholder="09xx-xxx-xxx" inputmode="tel"></div>
  <button class="save" onclick="saveNewCustomer()">建立</button>
</div>

<!-- 設定：提醒門檻 -->
<div class="sheet" id="settingsSheet">
  <h3>提醒門檻</h3>
  <p class="hint">距離上次聯絡幾天後，燈號變色提醒你該追蹤。全部客戶共用這組門檻。</p>
  <div class="field"><label>幾天沒聯絡 → 🟡 黃燈（該追蹤了）</label><input type="number" id="set-yellow" inputmode="numeric"></div>
  <div class="field"><label>幾天沒聯絡 → 🔴 紅燈（太久沒聯絡）</label><input type="number" id="set-red" inputmode="numeric"></div>
  <button class="save" onclick="saveSettings()">儲存設定</button>
  <div style="border-top:1px solid var(--line);margin:18px 0 14px;"></div>
  <p class="hint" style="margin:0 0 12px;">資料只存這台裝置，<b style="color:var(--red);">清除瀏覽器資料或換手機就會消失</b>，請定期匯出備份。</p>
  <div style="display:flex;gap:10px;">
    <button class="btn btn-ghost" style="border-radius:12px;padding:13px;font-weight:700;" onclick="exportBackup()">⬇ 匯出備份</button>
    <button class="btn btn-ghost" style="border-radius:12px;padding:13px;font-weight:700;" onclick="document.getElementById('crmFile').click()">⬆ 匯入還原</button>
  </div>
</div>

<input type="file" id="crmFile" accept="application/json" style="display:none" onchange="importBackup(event)">
<div class="toast" id="toast"></div>

<script>
/* ============================================================
   資料層
   BizCardDB：名片程式擁有，CRM 只讀（同一支 App、同源即通）
   CrmDB：CRM 擁有（crm 追蹤 / manual_cards 手動客戶 / settings 設定）
   ============================================================ */
const BIZ_DB='BizCardDB', CRM_DB='CrmDB';
let crmDb=null, dataSource='none', cardsCache=[], mergedCache=[], currentId=null, config=null;
let bizConn=null;

const DEFAULT_CONFIG={key:'config', yellow:30, red:60};

/* 只讀 BizCardDB：共用單一連線＋onversionchange 主動讓路，避免堆積連線卡死名片 App 的 DB 升級；
   且名片庫尚未建立時不憑空建出空 DB 干擾名片 App 初始化 */
async function openBiz(){
  if(bizConn) return bizConn;
  try{ if(indexedDB.databases){ const dbs=await indexedDB.databases(); if(!dbs.some(d=>d.name===BIZ_DB)) return null; } }catch(e){}
  bizConn=await new Promise(resolve=>{
    let req; try{ req=indexedDB.open(BIZ_DB); }catch(e){ return resolve(null); }
    req.onsuccess=e=>{ const db=e.target.result; db.onversionchange=()=>{ try{db.close();}catch(_){} bizConn=null; imgCache={}; }; resolve(db); };
    req.onerror=()=>resolve(null);
  });
  return bizConn;
}
/* CrmDB 維持與已上線版相同的 version 2 / 四表結構（含 cards_snapshot 不使用），避免升級風險 */
function openCrm(){
  return new Promise((resolve,reject)=>{
    const req=indexedDB.open(CRM_DB,2);
    req.onupgradeneeded=e=>{
      const db=e.target.result;
      if(!db.objectStoreNames.contains('crm')) db.createObjectStore('crm',{keyPath:'cardId'});
      if(!db.objectStoreNames.contains('cards_snapshot')) db.createObjectStore('cards_snapshot',{keyPath:'id'});
      if(!db.objectStoreNames.contains('manual_cards')) db.createObjectStore('manual_cards',{keyPath:'id'});
      if(!db.objectStoreNames.contains('settings')) db.createObjectStore('settings',{keyPath:'key'});
    };
    req.onsuccess=e=>resolve(e.target.result);
    req.onerror=e=>reject(e.target.error);
  });
}
function getAll(db,store){
  return new Promise(resolve=>{
    if(!db||!db.objectStoreNames.contains(store)) return resolve([]);
    const r=db.transaction([store],'readonly').objectStore(store).getAll();
    r.onsuccess=()=>resolve(r.result||[]); r.onerror=()=>resolve([]);
  });
}
function putRec(store,rec){
  return new Promise((resolve,reject)=>{
    const tx=crmDb.transaction([store],'readwrite'); tx.objectStore(store).put(rec);
    tx.oncomplete=()=>resolve(); tx.onerror=e=>reject(e.target.error);
  });
}
function getOne(store,key){
  return new Promise(resolve=>{
    if(!crmDb.objectStoreNames.contains(store)) return resolve(null);
    const r=crmDb.transaction([store],'readonly').objectStore(store).get(key);
    r.onsuccess=()=>resolve(r.result||null); r.onerror=()=>resolve(null);
  });
}
const getCrm=id=>getOne('crm',id);

async function loadConfig(){
  const r=await getOne('settings','config');
  config = r ? {key:'config', yellow:(r.yellow??r.defYellow??30), red:(r.red??r.defRed??60)} : {...DEFAULT_CONFIG};
}

/* 載入名片：直接讀名片 App 的 BizCardDB，併入手動客戶；
   並保留「已被刪名片但仍有追蹤紀錄」的孤兒客戶（用 cards_snapshot） */
async function loadCards(){
  const biz=await openBiz();
  const live=await getAll(biz,'cards');
  const manual=await getAll(crmDb,'manual_cards');
  const map=new Map();
  live.forEach(c=>{ if(c&&c.id) map.set(c.id,c); });
  manual.forEach(c=>{ if(c&&c.id) map.set(c.id,c); });
  // 現存名片存一份快照，之後名片被刪也能保住客戶歷史
  for(const c of live){ if(c&&c.id){ try{ await putRec('cards_snapshot',c); }catch(e){} } }
  // 補回「名片已刪、但還有 CRM 紀錄」的客戶
  const [snap,crmRecs]=await Promise.all([getAll(crmDb,'cards_snapshot'),getAll(crmDb,'crm')]);
  const tracked=new Set(crmRecs.map(r=>r&&r.cardId));
  for(const s of snap){ if(s&&s.id&&!map.has(s.id)&&tracked.has(s.id)) map.set(s.id,{...s,_deletedCard:true}); }
  dataSource = live.length ? 'live' : (map.size ? 'manual' : 'none');
  cardsCache=[...map.values()];
}

/* ============================================================
   狀態燈（單一全域門檻）
   ============================================================ */
const DAY=86400000;
function todayStart(){ const d=new Date(); d.setHours(0,0,0,0); return d.getTime(); }
function computeStatus(crm){
  if(!crm || !((crm.logs&&crm.logs.length)||crm.nextRemind))
    return {key:'grey',label:'尚未追蹤',cls:'s-grey'};
  if(crm.nextRemind){
    const rt=new Date(crm.nextRemind+'T00:00:00').getTime();
    if(rt<=todayStart()) return {key:'red',label:'提醒到期',cls:'s-red'};
  }
  if(crm.logs&&crm.logs.length){
    const last=Math.max(...crm.logs.map(l=>l.at));
    const days=Math.floor((todayStart()-last)/DAY);
    if(days>=config.red) return {key:'red',label:days+'天沒聯絡',cls:'s-red'};
    if(days>=config.yellow) return {key:'yellow',label:'該追蹤了',cls:'s-yellow'};
    return {key:'green',label:days<=0?'今天聯絡':days+'天前',cls:'s-green'};
  }
  return {key:'yellow',label:'待處理',cls:'s-yellow'};
}
const STATUS_ORDER={red:0,yellow:1,grey:2,green:3};

/* ============================================================
   顯示輔助
   ============================================================ */
function initial(name){ return (name||'?').trim().charAt(0)||'?'; }
function avatarColor(name){
  const colors=['#e5484d','#d98a00','#22a565','#4f7cff','#6a5cff','#0ea5e9','#e0699a'];
  let h=0; for(const ch of (name||'')) h=(h*31+ch.charCodeAt(0))>>>0;
  return colors[h%colors.length];
}
function fmtDate(ts){ const d=new Date(ts); return (d.getMonth()+1)+'/'+d.getDate(); }
function todayISO(){ const d=new Date(); d.setHours(12,0,0,0); return d.toISOString().slice(0,10); }
const TYPE_LABEL={phone:'電話',visit:'見面',message:'訊息',note:'備註'};
function esc(s){return (s==null?'':String(s)).replace(/[&<>"]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c]));}

/* ============================================================
   主渲染
   ============================================================ */
async function buildMerged(){
  const merged=[];
  for(const card of cardsCache){
    const crm=await getCrm(card.id);
    merged.push({card,crm,status:computeStatus(crm)});
  }
  merged.sort((a,b)=>{
    const s=STATUS_ORDER[a.status.key]-STATUS_ORDER[b.status.key];
    if(s) return s;
    return (a.card.name||'').localeCompare(b.card.name||'','zh-Hant');
  });
  mergedCache=merged;
}
function render(){
  const q=(document.getElementById('q').value||'').trim().toLowerCase();
  const list=document.getElementById('list'), sub=document.getElementById('subline');
  const srcTag = dataSource==='live' ? '<span class="source-tag src-live">● 同步名片</span>'
    : dataSource==='manual' ? '<span class="source-tag src-json">● 手動客戶</span>'
    : '<span class="source-tag src-none">● 無資料</span>';
  const needFollow=mergedCache.filter(m=>m.status.key==='red'||m.status.key==='yellow').length;
  sub.innerHTML=`共 ${mergedCache.length} 位　·　${needFollow} 位待跟進 ${srcTag}`;

  if(cardsCache.length===0){
    document.getElementById('today-wrap').innerHTML='';
    list.innerHTML=`<div class="empty"><div class="big">📇</div>
      還沒有客戶。<br>去「名片」分頁拍照建立名片，<br>或點右下「＋ 新增客戶」手動加一位。</div>`;
    return;
  }
  const dueToday=mergedCache.filter(m=>m.crm&&m.crm.nextRemind&&
    new Date(m.crm.nextRemind+'T00:00:00').getTime()<=todayStart());
  document.getElementById('today-wrap').innerHTML=(dueToday.length
    ? `<div class="today"><div class="t1">⏰ 今天要聯絡（${dueToday.length}）</div>
       <div class="t2">${dueToday.map(m=>esc(m.card.name)+(m.crm.remindNote?'（'+esc(m.crm.remindNote)+'）':'')).join('<br>')}</div></div>`
    : '');

  const shown=mergedCache.filter(m=>{
    if(!q) return true;
    const logText=(m.crm&&m.crm.logs?m.crm.logs.map(l=>l.text).join(' '):'');
    return ((m.card.name||'')+(m.card.org||'')+logText).toLowerCase().includes(q);
  });
  const groups=[
    {key:'待跟進',items:shown.filter(m=>m.status.key==='red'||m.status.key==='yellow')},
    {key:'尚未追蹤',items:shown.filter(m=>m.status.key==='grey')},
    {key:'最近聯絡',items:shown.filter(m=>m.status.key==='green')},
  ];
  list.innerHTML=groups.filter(g=>g.items.length).map(g=>
    `<div class="lbl">${g.key}（${g.items.length}）</div>`+g.items.map(cardRow).join('')
  ).join('')||`<div class="empty">找不到符合「${esc(q)}」的客戶</div>`;
}
function cardRow(m){
  const c=m.card, col=avatarColor(c.name);
  const role=[c.org,c.title].filter(Boolean).join(' · ')||'—';
  const delTag=c._deletedCard?' <span style="color:#b4bccb;font-weight:600;">（名片已刪）</span>':'';
  return `<div class="card" onclick="openDetail('${c.id}')">
    <div class="avatar" style="background:${col}">${initial(c.name)}</div>
    <div class="c-main"><div class="c-name">${esc(c.name)||'（無名）'}</div><div class="c-org">${esc(role)}${delTag}</div></div>
    <div class="status ${m.status.cls}"><span class="dot"></span>${m.status.label}</div>
  </div>`;
}

/* ============================================================
   詳情
   ============================================================ */
let imgCache={};
async function getImage(id){
  if(imgCache[id]!==undefined) return imgCache[id];
  const biz=await openBiz();
  const rec=await new Promise(r=>{
    if(!biz||!biz.objectStoreNames.contains('images')) return r(null);
    const q=biz.transaction(['images'],'readonly').objectStore('images').get(id);
    q.onsuccess=()=>r(q.result||null); q.onerror=()=>r(null);
  });
  imgCache[id]=rec&&rec.image?rec.image:null; return imgCache[id];
}
async function openDetail(id){
  currentId=id;
  const m=mergedCache.find(x=>x.card.id===id); if(!m) return;
  const c=m.card, crm=m.crm, col=avatarColor(c.name);
  const role=[c.org,c.title,c.dept].filter(Boolean).join(' · ')||'—';
  const tel=c.mobile||c.tel||c.phone||'';

  const remindHtml=crm&&crm.nextRemind
    ? `<div class="remind-box" onclick="openRemindSheet()"><div><div class="r1">⏰ 下次提醒</div>
        <div class="r2">${crm.nextRemind.slice(5).replace('-','/')}　${esc(crm.remindNote||'')}</div></div><div style="font-size:22px">🔔</div></div>`
    : `<div class="remind-box none" onclick="openRemindSheet()"><div><div class="r1">下次提醒</div>
        <div class="r2">尚未設定，點此新增</div></div><div style="font-size:20px">＋</div></div>`;

  const logs=(crm&&crm.logs?[...crm.logs]:[]).sort((a,b)=>b.at-a.at);
  const logHtml=logs.length
    ? `<div class="lbl" style="margin-left:22px">互動紀錄（${logs.length}）</div><div class="log">`+
      logs.map(l=>`<div class="log-item"><div class="log-date">${fmtDate(l.at)}</div>
        <div class="log-text"><span class="log-tag">${TYPE_LABEL[l.type]||'備註'}</span>${esc(l.text)}</div></div>`).join('')+`</div>`
    : `<div class="lbl" style="margin-left:22px">互動紀錄</div><div class="log-empty">還沒有紀錄，點下方「記一筆」開始追蹤 👇</div>`;

  document.getElementById('d-body').innerHTML=`
    <div class="d-head">
      <div class="d-av" id="d-av" style="background:${col}">${initial(c.name)}</div>
      <div class="d-name">${esc(c.name)||'（無名）'}</div>
      <div class="d-role">${esc(role)}</div>
      <div class="contact">
        <a class="${tel?'':'off'}" href="tel:${esc(tel)}">📞 撥打</a>
        <a class="${c.email?'':'off'}" href="mailto:${esc(c.email||'')}">✉ Email</a>
        <a class="${tel?'':'off'}" href="sms:${esc(tel)}">💬 訊息</a>
      </div>
    </div>
    ${remindHtml}${logHtml}`;
  getImage(id).then(img=>{ if(img){const el=document.getElementById('d-av'); if(el){el.style.backgroundImage=`url(${img})`;el.textContent='';}}});
  document.getElementById('detail').classList.add('open');
}
function closeDetail(){ document.getElementById('detail').classList.remove('open'); currentId=null; }

async function ensureCrm(){
  return await getCrm(currentId) || {cardId:currentId,logs:[],nextRemind:null,remindNote:'',updatedAt:0};
}

/* ============================================================
   記一筆
   ============================================================ */
let logType='phone';
function buildTypeChips(){
  document.getElementById('typeRow').innerHTML=Object.entries(TYPE_LABEL)
    .map(([k,v])=>`<div class="type-chip ${k===logType?'on':''}" onclick="pickType('${k}')">${v}</div>`).join('');
}
function pickType(t){ logType=t; buildTypeChips(); }

/* 互動重點：點選預設，不用打字（要自己打就點「✏️ 自訂」） */
const LOG_NOTES=['已聯絡上','沒接到','約了見面','報價中','考慮中','已成交','送了資料','問候一下'];
let logNoteSel=null;
function buildLogNoteChips(){
  document.getElementById('logNoteChips').innerHTML=LOG_NOTES.map(n=>
    `<div class="type-chip ${logNoteSel===n?'on':''}" onclick="pickLogNote('${n}')">${n}</div>`).join('')
    +`<div class="type-chip" onclick="showLogCustom()">✏️ 自訂</div>`;
}
function pickLogNote(n){
  if(logNoteSel===n){ logNoteSel=null; document.getElementById('logText').value=''; }
  else{ logNoteSel=n; document.getElementById('logText').value=n; document.getElementById('logCustomField').style.display='none'; }
  buildLogNoteChips();
}
function showLogCustom(){
  logNoteSel=null; buildLogNoteChips();
  document.getElementById('logCustomField').style.display='block';
  document.getElementById('logText').focus();
}
function showLogDate(){
  document.getElementById('logDateToggle').style.display='none';
  document.getElementById('logDateField').style.display='block';
}
function openLogSheet(){
  logType='phone'; buildTypeChips();
  logNoteSel=null; buildLogNoteChips();
  document.getElementById('logText').value='';
  document.getElementById('logCustomField').style.display='none';
  document.getElementById('logDate').value=todayISO();
  document.getElementById('logDateField').style.display='none';
  document.getElementById('logDateToggle').style.display='block';
  openSheet('logSheet');
}
async function saveLog(){
  const text=document.getElementById('logText').value.trim();
  const dateStr=document.getElementById('logDate').value;
  const at=dateStr?new Date(dateStr+'T12:00:00').getTime():Date.now();
  const crm=await ensureCrm(); crm.logs=crm.logs||[]; crm.logs.push({at,type:logType,text}); crm.updatedAt=Date.now();
  await putRec('crm',crm); closeSheets(); toast('已記錄 ✓'); await refresh(); openDetail(currentId);
}

/* ============================================================
   設提醒（快捷天數）
   ============================================================ */
let remindSel=null;
function buildRemindQuick(){
  const opts=[{d:3,t:'3 天後'},{d:7,t:'1 週後'},{d:30,t:'1 個月後'}];
  document.getElementById('remindQuick').innerHTML=opts.map(o=>
    `<div class="type-chip ${remindSel===o.d?'on':''}" onclick="setRemindIn(${o.d})">${o.t}</div>`).join('');
}
function setRemindIn(days){
  remindSel=days;
  const d=new Date(); d.setHours(12,0,0,0); d.setDate(d.getDate()+days);
  document.getElementById('remindDate').value=d.toISOString().slice(0,10);
  buildRemindQuick();
}
function clearRemindChip(){ remindSel=null; buildRemindQuick(); }

/* 提醒事由：點選預設，不用打字（要自己打就點「✏️ 自訂」） */
const REMIND_REASONS=['追報價','追進度','回個電','送資料','約拜訪','問候','確認訂單','催收款'];
let remindReasonSel=null;
function buildRemindReasonChips(){
  document.getElementById('remindReasonChips').innerHTML=REMIND_REASONS.map(n=>
    `<div class="type-chip ${remindReasonSel===n?'on':''}" onclick="pickRemindReason('${n}')">${n}</div>`).join('')
    +`<div class="type-chip" onclick="showRemindCustom()">✏️ 自訂</div>`;
}
function pickRemindReason(n){
  if(remindReasonSel===n){ remindReasonSel=null; document.getElementById('remindNote').value=''; }
  else{ remindReasonSel=n; document.getElementById('remindNote').value=n; document.getElementById('remindCustomField').style.display='none'; }
  buildRemindReasonChips();
}
function showRemindCustom(){
  remindReasonSel=null; buildRemindReasonChips();
  document.getElementById('remindCustomField').style.display='block';
  document.getElementById('remindNote').focus();
}
function openRemindSheet(){
  getCrm(currentId).then(crm=>{
    remindSel=null;
    document.getElementById('remindDate').value=crm&&crm.nextRemind?crm.nextRemind:todayISO();
    const note=crm&&crm.remindNote?crm.remindNote:'';
    document.getElementById('remindNote').value=note;
    remindReasonSel=REMIND_REASONS.includes(note)?note:null;
    document.getElementById('remindCustomField').style.display=(note&&!remindReasonSel)?'block':'none';
    buildRemindQuick();
    buildRemindReasonChips();
    openSheet('remindSheet');
  });
}
async function saveRemind(){
  const date=document.getElementById('remindDate').value;
  const note=document.getElementById('remindNote').value.trim();
  if(!date){ toast('請選日期'); return; }
  const crm=await ensureCrm(); crm.nextRemind=date; crm.remindNote=note; crm.updatedAt=Date.now();
  await putRec('crm',crm); closeSheets(); toast('提醒已設定 ✓'); await refresh(); openDetail(currentId);
}
async function clearRemind(){
  const crm=await getCrm(currentId);
  if(crm){ crm.nextRemind=null; crm.remindNote=''; crm.updatedAt=Date.now(); await putRec('crm',crm); }
  closeSheets(); toast('提醒已清除'); await refresh(); openDetail(currentId);
}

/* ============================================================
   新增客戶（姓名 / 公司 / 手機）
   ============================================================ */
function openNewCustomer(){
  ['name','org','mobile'].forEach(f=>document.getElementById('nc-'+f).value='');
  openSheet('newSheet');
}
async function saveNewCustomer(){
  const name=document.getElementById('nc-name').value.trim();
  if(!name){ toast('請輸入姓名'); return; }
  const id='m'+Date.now()+Math.floor(Math.random()*1000);
  const card={id,name,
    org:document.getElementById('nc-org').value.trim(),
    mobile:document.getElementById('nc-mobile').value.trim(),
    createdAt:Date.now(), _manual:true};
  await putRec('manual_cards',card);
  closeSheets(); toast('客戶已建立 ✓'); await refresh(); openDetail(id);
}

/* ============================================================
   設定：單一提醒門檻
   ============================================================ */
function openSettings(){
  document.getElementById('set-yellow').value=config.yellow;
  document.getElementById('set-red').value=config.red;
  openSheet('settingsSheet');
}
async function saveSettings(){
  const y=+document.getElementById('set-yellow').value||30;
  let r=+document.getElementById('set-red').value||60;
  if(r<y) r=y; // 紅燈天數不得小於黃燈
  config={key:'config', yellow:y, red:r};
  await putRec('settings',config);
  closeSheets(); toast('設定已儲存 ✓'); await refresh();
}

function openSheet(id){ document.getElementById('mask').classList.add('open'); document.getElementById(id).classList.add('open'); }
function closeSheets(){ document.getElementById('mask').classList.remove('open'); document.querySelectorAll('.sheet').forEach(s=>s.classList.remove('open')); }

let toastTimer=null;
function toast(msg){
  const t=document.getElementById('toast'); t.textContent=msg; t.classList.add('show');
  clearTimeout(toastTimer); toastTimer=setTimeout(()=>t.classList.remove('show'),1800);
}

/* ============================================================
   匯出 / 匯入備份（本機資料保命）
   ============================================================ */
async function exportBackup(){
  const data={ v:1, exportedAt:new Date().toISOString(),
    crm: await getAll(crmDb,'crm'),
    manual_cards: await getAll(crmDb,'manual_cards'),
    settings: await getAll(crmDb,'settings') };
  const blob=new Blob([JSON.stringify(data,null,2)],{type:'application/json'});
  const url=URL.createObjectURL(blob);
  const a=document.createElement('a');
  a.href=url; a.download='客戶追蹤備份_'+new Date().toISOString().slice(0,10)+'.json';
  document.body.appendChild(a); a.click(); a.remove();
  setTimeout(()=>URL.revokeObjectURL(url),1000);
  toast('已匯出備份 ✓');
}
async function importBackup(ev){
  const file=ev.target.files[0]; if(!file) return;
  try{
    const data=JSON.parse(await file.text());
    if(!data||(!data.crm&&!data.manual_cards&&!data.settings)){ toast('檔案格式不符'); ev.target.value=''; return; }
    for(const r of (data.crm||[])) if(r&&r.cardId) await putRec('crm',r);
    for(const r of (data.manual_cards||[])) if(r&&r.id) await putRec('manual_cards',r);
    for(const r of (data.settings||[])) if(r&&r.key) await putRec('settings',r);
    await loadConfig(); closeSheets(); toast('已還原備份 ✓'); await refresh();
  }catch(e){ toast('匯入失敗'); console.error(e); }
  ev.target.value='';
}

/* 通知外層（名片 App）更新分頁紅點；並接收「切回分頁」重整訊號 */
function notifyParent(){ try{ if(window.parent&&window.parent!==window) window.parent.postMessage('crm-changed','*'); }catch(e){} }
function applyCrmTheme(dark){ document.documentElement.setAttribute('data-theme', dark?'dark':'light'); }
window.addEventListener('message', e=>{
  if(!e||e.data==null) return;
  if(e.data==='crm-refresh') refresh();
  else if(e.data.type==='crm-theme') applyCrmTheme(!!e.data.dark);
});

async function refresh(){ await loadCards(); await buildMerged(); render(); notifyParent(); }
async function init(){
  try{ crmDb=await openCrm(); }
  catch(e){ const s=document.getElementById('subline'); if(s) s.textContent='⚠️ 此裝置無法儲存資料（可能是無痕模式）'; return; }
  await loadConfig(); await refresh();
}
init();
</script>
